debugmode: false
# Language: es, en, fr
language: es

# Configuración Principal - Death Note System
permission:
  dbg: deathnote.op
  distribute: deathnote.distribute  # ✅ NUEVO PERMISO

# Mensajes del sistema Watari-L
# Distribución de Roles
role_distribution:
  priority_roles:
    - "kira"
    - "l"
    - "mikami"
    - "mello"
    - "near"
    - "watari"
  default_role: "investigator"
  messages:
    role_assigned: "§e¡Has sido asignado como §6{role}§e!"
    distribution_started: "§6§l¡Distribución de roles iniciada!"
    distribution_completed: "§a§l¡Distribución de roles completada!"
    not_enough_players: "§cNo hay suficientes jugadores para distribuir los roles"
    already_distributed: "§cLos roles ya han sido distribuidos"
cooldowns:
  death_note_kill: 60
  mello_ability: 20
  steal_identification: 120
# Sistema de Intercambio Kira-Mikami
role_swap_system:
  enabled: true
  swap_item:
    material: "NETHER_STAR"
    name: "§6Intercambio de Roles"
    lore:
      - "§7Intercambia los roles de Kira y Mikami"
      - "§7Click derecho para activar"
      - ""
      - "§eCooldown: §6{cooldown} segundos"
      - ""
      - "§aKira ↔ Mikami"
  cooldown: 300
  protected: true
  # Mensajes del sistema Watari-L
  watari:
    not_watari_or_l: "&cError: Solo Watari puede dar documentos a L"
    no_ids_to_give: "&cNo tienes identificaciones de otros jugadores para dar"
    cannot_get_owner: "&cError: No se pudo obtener el dueño de la identificación"
    transfer_failed: "&cNo puedes dar la id propia al jugador"
    give_success: "&aHas entregado la identificación de {player} a L"
    cannot_give_own_id: "&cNo puedes dar tu propia identificación a L"
    l_inventory_full: "&cEl inventario de L está lleno"

  l:
    receive_success: "&aWatari te ha entregado la identificación de {player} con información adicional"
    inspect_success: "&aHas inspeccionado el documento de {player} y revelado su rol"
    not_l: "&cSolo L puede inspeccionar documentos"
    invalid_document: "&cEste no es un documento de identificación válido"
    unknown_owner: "&cNo se pudo identificar el dueño de este documento"
    not_in_system: "&cNo tienes esta identificación registrada en tu sistema"
  messages:
    watari:
      not_watari_or_l: "&cError: Solo Watari puede dar documentos a L"
      no_ids_to_give: "&cNo tienes identificaciones de otros jugadores para dar"
      cannot_get_owner: "&cError: No se pudo obtener el dueño de la identificación"
      transfer_failed: "&cNo puedes dar la id propia al jugador"
      give_success: "&aHas entregado la identificación de {player} a L"
      cannot_give_own_id: "&cNo puedes dar tu propia identificación a L"
      l_inventory_full: "&cEl inventario de L está lleno"

    l:
      receive_success: "&aWatari te ha entregado la identificación de {player} con información adicional"
      inspect_success: "&aHas inspeccionado el documento de {player} y revelado su rol"
      not_l: "&cSolo L puede inspeccionar documentos"
      invalid_document: "&cEste no es un documento de identificación válido"
      unknown_owner: "&cNo se pudo identificar el dueño de este documento"
      not_in_system: "&cNo tienes esta identificación registrada en tu sistema"
    swap_success: "§6¡Roles intercambiados! §e{old_role} §6→ §e{new_role}"
    swap_cooldown: "§cDebes esperar {time} segundos para usar el intercambio nuevamente"
    not_kira: "§cSolo Kira puede usar el item de intercambio"
    no_mikami: "§cNo hay ningún Mikami online para intercambiar roles"
    item_received: "§6Has recibido el item de intercambio de roles"
    cannot_drop: "§cNo puedes tirar el item de intercambio"
    cannot_move: "§cNo puedes mover el item de intercambio"
  effects:
    particles: "PORTAL"
    sound: "ENTITY_ENDERMAN_TELEPORT"
# Shinigami Eye Deal Configuration
shinigami_eye_deal:
  enabled: true
  # Item para activar el pacto
  activation_item:
    material: "RED_DYE"
    name: "§4Sangre del Shinigami"
    lore:
      - "§8Pacto con el Dios de la Muerte"
      - "§7Click derecho para activar el pacto"
      - ""
      - "§cCOSTO: Mitad de vida permanente"
      - "§aBENEFICIOS:"
      - "§2- Robo acelerado (§e{cooldown}s§2)"
      - "§2- Ver vida de otros jugadores"
      - ""
      - "§4⚠ IRREVERSIBLE ⚠"

  # Item después de activar (gris)
  used_item:
    material: "GRAY_DYE"
    name: "§8Pacto Consumido"
    lore:
      - "§7Ya has hecho el pacto Shinigami"
      - "§7No puedes volver a usarlo"

  benefits:
    steal_cooldown: 15  # Cooldown después del robo con pacto
    proximity_time: 10  # ✅ TIEMPO DE PROXIMIDAD RÁPIDO CON PACTO
    show_health_display: true

  effects:
    activation_particles: "SOUL_FIRE_FLAME"
    activation_sound: "ENTITY_WITHER_SPAWN"
    health_display_color: "§c❤"

roles:
  kira:
    death_note_item: "WRITTEN_BOOK"
    kill_timing: 10
    particles:
      enabled: true
      type: "FLAME"
      color: "255,0,0"
      count: 5
      speed: 0.1
    sounds:
      open_menu: "BLOCK_END_PORTAL_SPAWN"
      kill: "ENTITY_WITHER_DEATH"
  mello:
    ally_penalty: true
    damage:
      kira_l: 2.0
      others: 4.0
    particles:
      ability_activate: "FLAME"
      ability_hit: "EXPLOSION_NORMAL"
    sounds:
      ability_use: "ENTITY_PLAYER_ATTACK_STRONG"
      ability_hit: "ENTITY_GENERIC_EXPLODE"
  mikami:
    can_steal: true
    can_give_ids: true
  l:
    anonymous_chat_color: "BLUE"
    can_see_real_roles: true
  watari:
    can_see_l: true
  near:
    auto_promote: true
  investigator:
    default_role: true

stealing:
  enabled: true
  backstab_angle: 90
  require_proximity: true
  proximity_radius: 30.0
  proximity_time: 30  # Tiempo de proximidad NORMAL
  victim_loses_id: false
  prevent_duplicate_ids: true
  cooldown: 120  # Cooldown NORMAL después del robo
  particles:
    victim: "SMOKE_NORMAL"
    thief: "VILLAGER_HAPPY"
  sounds:
    success: "ENTITY_ITEM_PICKUP"
    fail: "ENTITY_VILLAGER_NO"

death_note:
  enabled: true
  require_identification: true
  menu_title: "Death Note"
  protected: true
  particles:
    on_use: "SOUL_FIRE_FLAME"
    on_kill: "SMOKE_LARGE"
  sounds:
    on_open: "BLOCK_END_PORTAL_SPAWN"
    on_kill: "ENTITY_WITHER_DEATH"

identification:
  protected: true
  cannot_drop: true
  cannot_move: true
  respawn_with_new: true
  clear_on_death: true

# Sistema de Misión de L
mission_system:
  enabled: true

  # Item que recibe L para abrir el menú de misiones
  mission_item:
    material: "COMPASS"
    name: "§bMisión de L"
    lore:
      - "§7Click derecho para asignar misión"
      - "§7Selecciona zona y jugadores"
    # Cooldown en segundos entre misiones
    cooldown: 60

  # Configuración de la misión
  mission:
    # Número máximo de jugadores por misión
    max_players: 2
    # Si se puede pausar la misión cuando un jugador sale de la zona
    pause_enabled: true
    # Tiempo máximo en segundos antes de que falle la misión
    max_duration: 300
    # Recompensa al completar (experiencia)
    reward_exp: 0

  # Configuración del BossBar
  bossbar:
    title_format: "§b{zone} §7| §f{players} §7| §a{in_zone}§7/§a{total_players} §7| {status} §7| §e{coordinates}"
    colors:
      active: "BLUE"
      paused: "YELLOW"
      completed: "GREEN"
      failed: "RED"

  # Mensajes del sistema de misiones
  messages:
    teleport_success: "§aTeletransportado a: {zone}"
    teleport_no_permission: "§cNo tienes permiso para teletransportarte a misiones"
    cooldown: "§cDebes esperar {time} segundos antes de asignar otra misión"
    no_permission: "§cSolo L puede usar este item"
    zone_not_found: "§cZona no encontrada"
    need_players: "§cDebes seleccionar exactamente {max_players} jugadores"
    player_dead: "§c{player} está muerto"
    player_unavailable: "§cError: Uno o más jugadores seleccionados no están disponibles"
    mission_assigned: "§aMisión asignada: {zone}"
    mission_received: "§bL te ha asignado una misión en: {zone}"
    mission_instructions: "§7Debes permanecer {duration} segundos en la zona con tu compañero"
    mission_completed: "§a¡Misión completada! +{exp} exp"
    mission_failed: "§cMisión fallida: {reason}"
    mission_broadcast: "§b¡Misión '{zone}' completada exitosamente!"
    item_dropped: "§eTu item de misión fue dropeado al suelo porque tu inventario está lleno"
    item_received: "§b¡Has recibido el item de misión! Usa click derecho para asignar misiones."
    item_removed: "§cSe te ha removido el item de misión"
    already_has_item: "§cYa tienes el item de misión"
    cannot_drop_item: "§cNo puedes botar el item de misión"
    mission_paused: "§eMisión pausada - Un jugador salió de la zona"
    mission_resumed: "§aMisión reanudada - Todos en zona"
    mission_time_warning: "§6¡Quedan {time} segundos para completar la misión!"
    reason_player_left: "Un jugador abandonó la misión"
    reason_player_died: "Un jugador murió durante la misión"
    reason_timeout: "Tiempo agotado"
    reason_disconnected: "Un jugador se desconectó"
    penalty: "§c💔 ¡Penalidad! Has perdido 1 corazón por fallar la misión"

  # Mensajes de la GUI
  gui:
    zone_selection: "Seleccionar Zona de Misión"
    player_selection: "Seleccionar {max_players} Jugadores"
    zone_lore:
      - "§7Duración: §f{duration} segundos"
      - "§7Mundo: §f{world}"
      - "§7Coordenadas: §f{min_x}, {min_z} a {max_x}, {max_z}"
      - "§7Pausa: §f{pause_status}"
      - ""
      - "§aClick para seleccionar"
    player_lore:
      - "§7Rol: §f{role}"
      - "§7Estado: §aVivo"
      - ""
      - "§eClick para seleccionar"
    confirm_item:
      name: "§aConfirmar Misión ({selected}/{max_players})"
      lore:
        - "§7Asignar misión a los jugadores seleccionados"
        - "{selection_status}"
    selection_messages:
      selected: "§a{player} seleccionado"
      deselected: "§7{player} deseleccionado"
      max_selected: "§cYa has seleccionado {max_players} jugadores"
      self_selected: "§6Te has seleccionado a ti mismo"
      self_deselected: "§7Te has deseleccionado"
    selection_status:
      none: "§cSelecciona {max_players} jugadores (puedes incluirte)"
      partial: "§eSelecciona {remaining} jugador(es) más (puedes incluirte)"
      complete: "§a¡Listo para confirmar!"
      ready: "§aAmbos jugadores deben permanecer en la zona"

  effects:
    sounds:
      mission_start: "ENTITY_PLAYER_LEVELUP"
      mission_complete: "ENTITY_PLAYER_LEVELUP"
      mission_fail: "ENTITY_VILLAGER_NO"
      mission_pause: "BLOCK_NOTE_BLOCK_BIT"
      gui_open: "UI_BUTTON_CLICK"
      gui_select: "ENTITY_ITEM_PICKUP"
    particles:
      zone_marker: "VILLAGER_HAPPY"
      mission_complete: "TOTEM"
      mission_fail: "SMOKE_NORMAL"
    volume: 1.0
    pitch: 1.0

# Near settings
near:
  becomes_l_on_l_death: true
  conversion_message: "§9Near se ha convertido en el nuevo L!"

# Mello chain kill settings
mello_chain_kill:
  enabled: true
  kill_roles:
    - "near"
    - "investigator"
  death_message: "§6¡La muerte de Mello ha desatado el caos!"
  sound: "ENTITY_LIGHTNING_BOLT_THUNDER"
  # Si Near muere, Mello también muere (y viceversa)
  near_mello_link: true
  link_death_message: "&6La conexión entre Mello y Near los ha llevado a ambos a la muerte"

# Configuración de mensajes anónimos
anonymous_message:
  format: "§8[§7?§8] §7"
  cooldown: 30

anonymous_whisper:
  format: "§8[§7Susurro Misterioso§8] §7"

action_bar:
  enabled: true
  update_interval: 5
  watari_format: "&9L: {player}"
  l_format: "&9Watari: {player}"

particles:
  enabled: true
  kira_holding_death_note: true
  steal_effects: true
  death_effects: true

sounds:
  enabled: true
  volume: 1.0
  pitch: 1.0

# Mensajes del sistema
messages:
  death_note:
    open_menu: "&5Has abierto la Death Note..."
    kill_success: "&cHas escrito el nombre de {player} en la Death Note"
    kill_cooldown: "&eDebes esperar {time}s para usar la Death Note nuevamente"
    no_identification: "&7Necesitas la identificación de {player} para matarlo"
    no_permission: "&cSolo Kira puede usar la Death Note"

  mello:
    ability_ready: "&6¡Tu habilidad está cargada!"
    ability_used: "&eHas usado tu habilidad especial"
    ally_kill: "&4⚡ Has sido eliminado por traicionar a tus aliados"
    cooldown_active: "&eTu habilidad está en cooldown"

  steal:
    success: "&aHas robado la identificación de {player} (Próximo robo en: &6{cooldown}s&a)"
    cooldown: "&ePodrás robar nuevamente en {time}s"
    no_permission: "&cSolo Mikami y Kira pueden robar identificaciones"
    no_identification: "&cEste jugador no tiene identificación para robar"
    backstab_required: "&cDebes golpear por la espalda para robar"
    already_have_id: "&cYa tienes la identificación de {player}"
    proximity_required: "&cDebes permanecer cerca de {player} por {time}s para robar su identificación"
    proximity_started: "&eComenzando robo de {player}. Permanece cerca por &6{time}s &epara completar el robo"
    proximity_cancelled: "&cRobo cancelado. Te alejaste demasiado de {player}"
    victim_notified: "&cTu identificación ha sido robada por {thief_role}"

  mikami:
    give_success: "&aHas entregado una identificación a Kira"
    give_received: "&aMikami te ha entregado una identificación"
    inventory_full: "&cEl inventario de Kira está lleno"

  protection:
    cannot_drop: "&cNo puedes tirar tu identificación"
    cannot_move: "&cNo puedes mover la identificación fuera de tu inventario"
    cannot_swap: "&cNo puedes cambiar la identificación de mano"
    death_note_cannot_drop: "&cNo puedes tirar la Death Note"
    death_note_cannot_move: "&cNo puedes mover la Death Note fuera de tu inventario"
    shinigami_cannot_drop: "&cNo puedes tirar los items del pacto Shinigami"
    shinigami_cannot_move: "&cNo puedes mover los items del pacto fuera de tu inventario"
    shinigami_cannot_swap: "&cNo puedes cambiar los items del pacto de mano"

  death:
    inventory_cleared: "&7Tu inventario ha sido limpiado al morir"
    respawn_id_given: "&aHas recibido tu nueva identificación"

  roles:
    unknown: "&8???"
    kira: "&4Kira"
    l: "&9L"
    watari: "&3Watari"
    mello: "&6Mello"
    mikami: "&cMikami"
    near: "&fNear"
    investigator: "&7Investigador"

  join:
    welcome: "&a{player} ha entrado al servidor!"
    need_players: "&b{player} ha entrado, se ocupan minimo {min_players} para iniciar!"
    role_assigned: "&eTu rol es: {role}"

  conversion:
    kira_transferred: "&cHas transferido el rol de Kira a {player}"
    became_kira: "&4¡Ahora eres Kira!"
    became_mikami: "&cAhora eres Mikami"
    near_became_l: "&9¡Ahora eres L!"
    broadcast_conversion: "&6¡El rol de Kira ha sido transferido!"
    broadcast_near_l: "&9Near se ha convertido en el nuevo L!"

  death_note_received:
    message: "&4¡Has recibido la Death Note! Usa click derecho para abrirla."
    inventory_full: "&eTu Death Note fue dropeada al suelo porque tu inventario está lleno"

  victory:
    kira_wins: "&4¡KIRA GANA! §cL y Near han sido eliminados. El dios del nuevo mundo reina."
    l_wins: "&9¡L GANA! La justicia ha prevalecido."
    mello_wins: "&6¡MELLO GANA! El heredero ha cumplido su misión."
    near_wins: "&f¡NEAR GANA! La lógica ha vencido."
    investigator_wins: "&a¡LOS INVESTIGADORES GANAN! El orden ha sido restaurado."

debug:
  enabled: true
  permissions:
    reload: "deathnote.reload"
    debug: "deathnote.debug"

world:
  border:
    enabled: false
    size: 1000
    center_x: 0
    center_z: 0

game:
  min_players: 2
  max_players: 16
  game_duration: 7200
  auto_start: true

play:
  min-players: 2
  max-players: 16
  permision: "deathnote.staff"

database:
  enabled: false
  type: "sqlite"
  host: "localhost"
  port: 3306
  database: "deathnote"
  username: "username"
  password: "password"

logging:
  enabled: true
  level: "INFO"
  save_to_file: true
  debug_messages: false

# Lista de roles disponibles para asignación aleatoria
available_roles:
  - "investigator"
  - "investigator"
  - "investigator"
  - "investigator"
  - "investigator"
  - "kira"
  - "l"
  - "watari"
  - "mikami"
  - "mello"
  - "near"

# Permisos de robo por rol
stealing_permissions:
  kira: true
  mikami: true
  l: false
  watari: false
  mello: false
  near: false
  investigator: false

# Configuración de partículas avanzada
advanced_particles:
  kira:
    type: "REDSTONE"
    color: "255,0,0"
    count: 5
    offset_x: 0.5
    offset_y: 1.0
    offset_z: 0.5
    speed: 0.1
  steal:
    victim:
      type: "SMOKE_NORMAL"
      count: 10
      offset: 0.5
    thief:
      type: "VILLAGER_HAPPY"
      count: 5
      offset: 0.3
  death:
    type: "SOUL_FIRE_FLAME"
    count: 20
    offset: 1.0

# Configuración de sonidos avanzada
advanced_sounds:
  death_note:
    open:
      sound: "BLOCK_END_PORTAL_SPAWN"
      volume: 1.0
      pitch: 1.0
    kill:
      sound: "ENTITY_WITHER_DEATH"
      volume: 1.0
      pitch: 0.8
  steal:
    success:
      sound: "ENTITY_ITEM_PICKUP"
      volume: 0.5
      pitch: 1.2
    fail:
      sound: "ENTITY_VILLAGER_NO"
      volume: 0.8
      pitch: 1.0
  mello:
    ability:
      sound: "ENTITY_PLAYER_ATTACK_STRONG"
      volume: 1.0
      pitch: 1.0
    hit:
      sound: "ENTITY_GENERIC_EXPLODE"
      volume: 0.7
      pitch: 1.5

# Configuración del sistema de Death Note automático
death_note_auto:
  check_interval: 40
  enabled: true
  give_on_role_change: true
  give_on_join: true
  protected: true

# Configuración del sistema de IDs
identification_system:
  give_on_join: true
  give_on_respawn: true
  protected: true
  clear_on_death: true
  max_identifications: 10

# Sistema de Action Bars
action_bars:
  enabled: true
  update_interval: 5
  watari:
    enabled: true
    format: "&9L: {player}"
    color: "BLUE"
  l:
    enabled: true
    format: "&9Watari: {player}"
    color: "BLUE"
  kira:
    enabled: false
    format: "&4Mikami: {player}"
    color: "RED"

# Condiciones de Victoria
victory_conditions:
  enabled: true
  conditions:
    kira:
      - "kill_l"
      - "kill_near"
      - "l_and_near_dead"
    l:
      - "kill_kira"
      - "last_man_standing"
    mello:
      - "kill_kira"
      - "kill_l"
    near:
      - "become_l"
    investigator:
      - "kill_kira"
      - "last_man_standing"

# Sistema de Muerte en Cadena
death_chain:
  mello_near_link: true
  message: "&6La conexión entre Mello y Near los ha llevado a ambos a la muerte"

# Sucesión de Roles
succession:
  l_death:
    message_to_l: "&cL ha muerto. Near tomará tu lugar."
    message_to_near: "&b¡Ahora eres L! Continúa la investigación."
    broadcast: "&b{player} ha tomado el manto de L."
    no_successor: "&cL ha muerto y no hay sucesor."
  near_death:
    message_to_near: "&cNear ha muerto. Mello también morirá."
    message_to_mello: "&cHas muerto porque Near fue asesinado."
    broadcast: "&cMello ha muerto como consecuencia de la muerte de Near."
  mello_death:
    message_to_mello: "&cMello ha muerto. Near también morirá."
    message_to_near: "&cHas muerto porque Mello fue asesinado."
    broadcast: "&cNear ha muerto como consecuencia de la muerte de Mello."
  kira_death:
    message_to_kira: "&4Kira ha muerto. Un nuevo Kira puede surgir."
    broadcast: "&4¡Kira ha sido eliminado! ¿Surgirá un nuevo sucesor?"

# Mensajes de Muerte
death_messages:
  show_role: true
  show_killer: false
  format: "&c{player} ha muerto. Era {role}"
  broadcast_to_all: true